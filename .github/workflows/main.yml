name: Deploy to Alwaysdata

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Déploiement 1 : Liverpool
      - name: Deploy to Liverpool Alwaysdata
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp-liverpool.alwaysdata.net
          username: ${{ secrets.LIVERPOOL_AD_USER }}
          password: ${{ secrets.LIVERPOOL_AD_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./
          server-dir: /www/
          security: loose

      # Déploiement 2 : Yeadonaye
      - name: Deploy to Yeadonaye Alwaysdata
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp-yeadonaye.alwaysdata.net
          username: ${{ secrets.YEADONAYE_AD_USER }}
          password: ${{ secrets.YEADONAYE_AD_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./
          server-dir: /www/
          security: loose
