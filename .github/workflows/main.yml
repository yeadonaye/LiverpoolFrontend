name: Deploy to Alwaysdata

on:
  push:
    branches:
      - main

jobs:

  deploy-liverpool:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Liverpool Alwaysdata
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp-liverpool.alwaysdata.net
          username: ${{ secrets.LIVERPOOL_AD_USER }}
          password: ${{ secrets.LIVERPOOL_AD_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./
          server-dir: /www/
          security: loose
